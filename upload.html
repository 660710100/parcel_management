<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

<body>
  {{NAVBAR}}
  <!-- <?!= include('navBar'); ?> -->
  <div class="container mt-4">
    <form class="row g-3" id="uploadForm">
      <div class="col-md-4">
        <label for="inputName" class="form-label">ชื่อหน้ากล่อง</label>
        <input type="text" class="form-control" id="inputName" required>
      </div>
      <div class="col-md-4">
        <label for="inputPhone" class="form-label">เบอร์โทร</label>
        <input type="tel" class="form-control" id="inputPhone" name="inputPhone" pattern="\d{10}" maxlength="10" required>
      </div>
      <div class="col-md-4">
        <label for="inputDeposit" class="form-label">ยอดฝาก</label>
        <input type="number" class="form-control" id="inputDeposit" required>
      </div>
      <div class="col-md-3">
        <label for="parcelFile" class="form-label">ไฟล์หน้ากล่อง</label>
        <input type="file" accept="image/*" class="form-control" id="parcelFile" name="parcelFile" required>
      </div>
      <div class="row mt-3">
        <div class="col-md-3">
          <label for="itemFile" class="form-label">ไฟล์ของในกล่อง</label>
          <input type="file" accept="image/*" class="form-control" id="itemFile" name="itemFile" required>
        </div>
      </div>
      <div class="col-12">
        <button type="button" class="btn btn-primary" id="uploadButton">อัพโหลด</button>
      </div>
    </form>
  </div>
